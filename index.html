<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>It's Okay</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-base: #faf1e0;
        --bg-warm: #f6e5cd;
        --bg-glow: #f7c79a;
        --ink: #1f160e;
        --pill-bg: #fdf6ea;
        --pill-shadow: rgba(120, 70, 30, 0.08);
        --dot: #d96a4a;
        --grad-edge: #a8412c;
        --grad-mid: #ec8230;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
        margin: 0;
      }

      body {
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI",
          Roboto, sans-serif;
        color: var(--ink);
        background-color: var(--bg-base);
        background-image:
          radial-gradient(
            45% 35% at 70% 22%,
            rgba(247, 181, 130, 0.7) 0%,
            rgba(247, 181, 130, 0) 70%
          ),
          radial-gradient(
            120% 100% at 50% 50%,
            #fdf5e7 0%,
            #f4e3c9 70%,
            #ecd6b6 100%
          );
        background-attachment: fixed;
        position: relative;
        overflow: hidden;
        padding: 2rem 1.5rem 5rem;
      }

      .reminder {
        display: inline-flex;
        align-items: center;
        gap: 0.55em;
        padding: 0.5em 1em;
        margin: 0 0 1.1rem;
        background-color: var(--pill-bg);
        border-radius: 999px;
        font-size: clamp(0.7rem, 1vw, 0.82rem);
        font-weight: 600;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: var(--ink);
        box-shadow: 0 1px 2px var(--pill-shadow);
      }

      .reminder::before {
        content: "";
        width: 0.5em;
        height: 0.5em;
        border-radius: 50%;
        background-color: var(--dot);
        flex-shrink: 0;
      }

      h1 {
        margin: 0;
        font-family: "DM Serif Display", "Playfair Display", Georgia, serif;
        font-weight: 400;
        font-size: clamp(4rem, 17vw, 14rem);
        line-height: 1;
        letter-spacing: -0.01em;
        text-align: center;
        background: linear-gradient(
          90deg,
          var(--grad-edge) 0%,
          #c75324 30%,
          var(--grad-mid) 50%,
          #c75324 70%,
          var(--grad-edge) 100%
        );
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        color: transparent;
      }

      footer {
        position: absolute;
        bottom: 1.6rem;
        left: 0;
        right: 0;
        text-align: center;
        font-size: clamp(0.7rem, 0.95vw, 0.82rem);
        font-weight: 500;
        letter-spacing: 0.04em;
        color: var(--ink);
        opacity: 0.85;
      }
    </style>
  </head>
  <body>
    <span class="reminder">A Gentle Reminder</span>
    <h1>It&rsquo;s Okay</h1>
    <footer>&copy; 2026 It&rsquo;s Okay</footer>
  </body>
</html>
