<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>It's Okay</title>
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
      }

      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          sans-serif;
        color: #f5f0ff;
        background-color: #0b0a1f;
        background-image:
          radial-gradient(1.5px 1.5px at 12% 18%, #ffffff 50%, transparent 51%),
          radial-gradient(1px 1px at 27% 72%, #ffffff 50%, transparent 51%),
          radial-gradient(1.2px 1.2px at 38% 35%, #f0e7ff 50%, transparent 51%),
          radial-gradient(1px 1px at 51% 84%, #ffffff 50%, transparent 51%),
          radial-gradient(1.4px 1.4px at 64% 22%, #ffffff 50%, transparent 51%),
          radial-gradient(1px 1px at 73% 58%, #d9c8ff 50%, transparent 51%),
          radial-gradient(1.6px 1.6px at 81% 13%, #ffffff 50%, transparent 51%),
          radial-gradient(1px 1px at 88% 77%, #ffffff 50%, transparent 51%),
          radial-gradient(1.2px 1.2px at 6% 60%, #ffffff 50%, transparent 51%),
          radial-gradient(1px 1px at 44% 9%, #ffffff 50%, transparent 51%),
          radial-gradient(
            ellipse at 50% 50%,
            #2a1b4d 0%,
            #16103a 40%,
            #0b0a1f 80%
          );
        background-attachment: fixed;
        overflow: hidden;
      }

      .reminder {
        margin: 0 0 0.6em;
        font-size: clamp(0.9rem, 2vw, 1.4rem);
        font-weight: 300;
        letter-spacing: 0.35em;
        text-transform: lowercase;
        color: rgba(220, 205, 255, 0.75);
        text-shadow: 0 0 16px rgba(160, 130, 230, 0.45);
      }

      h1 {
        margin: 0;
        font-size: clamp(3rem, 12vw, 9rem);
        font-weight: 600;
        letter-spacing: 0.04em;
        text-align: center;
        text-shadow:
          0 0 12px rgba(200, 170, 255, 0.55),
          0 0 36px rgba(140, 100, 220, 0.45),
          0 0 72px rgba(90, 60, 180, 0.35);
        animation: breathe 8s ease-in-out infinite;
      }

      @keyframes breathe {
        0%,
        100% {
          opacity: 0.85;
        }
        50% {
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <p class="reminder">a gentle reminder</p>
    <h1>It's Okay</h1>
  </body>
</html>
